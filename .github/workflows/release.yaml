name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  release:
    name: Build, publish to PyPI and create GitHub Release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/glpi-utils/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Clean previous builds
        run: rm -rf dist/ build/ *.egg-info

      - name: Build
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Get the version from the tag (strip leading 'v')
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(python3 - <<'PYEOF'
import re, sys

version = "$VERSION"
changelog = open("CHANGELOG.md").read()

# Match the section for this version
pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
match = re.search(pattern, changelog, re.DOTALL)

if match:
    notes = match.group(1).strip()
    print(notes)
else:
    print(f"No changelog entry found for {version}")
    sys.exit(1)
PYEOF
          )

          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.changelog.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
